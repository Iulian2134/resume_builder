{% extends 'base.html' %}

{% block title %}Видалити резюме{% endblock %}

{% block content %}
<div class="confirm-box">
    <p class="eyebrow">Підтвердження</p>
    <h1>Видалити "{{ resume.title }}"?</h1>
    <p>Цю дію не можна скасувати.</p>
    <form method="post" class="actions">
        {% csrf_token %}
        <button class="button button-danger" type="submit">Так, видалити</button>
        <a class="button button-secondary" href="{% url 'resume_detail' resume.pk %}">Повернутися</a>
    </form>
</div>
{% endblock %}
