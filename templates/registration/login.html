{% extends 'base.html' %}

{% block title %}Вхід{% endblock %}

{% block content %}
<div class="auth-panel">
    <p class="eyebrow">Акаунт</p>
    <h1>Вхід</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Увійти</button>
    </form>
    <p class="muted">Ще немає акаунта? <a href="{% url 'register' %}">Зареєструватися</a></p>
</div>
{% endblock %}
