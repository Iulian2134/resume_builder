<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume Builder{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Головна навігація">
            <a class="brand" href="{% url 'home' %}">
                <span class="brand-mark">RB</span>
                <span>Resume Builder</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Головна</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'resume_list' %}">Мої резюме</a>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="link-button" type="submit">Вийти</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Вхід</a>
                    <a class="button button-small" href="{% url 'register' %}">Реєстрація</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="page">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="message {{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
